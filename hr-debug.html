<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HR Debug Tool v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2a;--text:#e8e8f0;--dim:#6b6b80;
--red:#ff4466;--green:#22dd88;--blue:#4488ff;--yellow:#ffcc33;--purple:#aa66ff;--cyan:#44ddee;--orange:#ff8844;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;-webkit-text-size-adjust:100%}
.container{max-width:420px;margin:0 auto;padding:12px;min-height:100dvh;display:flex;flex-direction:column}
h1{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:2px}
.subtitle{font-size:11px;color:var(--dim);margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:10px;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:12px 20px;transition:all 0.15s}
.btn-primary{background:var(--red);color:#fff;width:100%}
.btn-primary:active{transform:scale(0.98);opacity:0.9}
.btn-primary:disabled{opacity:0.4;cursor:default;transform:none}
.btn-sm{padding:6px 12px;font-size:11px;background:var(--border);color:var(--dim)}
.btn-sm.active{background:var(--red);color:#fff}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:var(--red);transition:width 0.3s}
.status{font-size:12px;color:var(--dim);text-align:center;margin:6px 0}
.bpm-display{text-align:center;padding:10px 0}
.bpm-num{font-size:52px;font-weight:800;line-height:1}
.bpm-label{font-size:11px;color:var(--dim);margin-top:4px}
.graph-container{position:relative;width:100%;background:#0d0d14;border-radius:8px;overflow:hidden;margin-bottom:8px}
.graph-container canvas{display:block;width:100%;height:auto}
.graph-label{position:absolute;top:6px;left:8px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;pointer-events:none;text-shadow:0 1px 3px #000}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.channel-toggles{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stat{background:var(--bg);border-radius:6px;padding:8px}
.stat-val{font-size:18px;font-weight:700}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:2px;margin-bottom:10px}
.tab{flex:1;text-align:center;padding:8px;border-radius:6px;font-size:11px;font-weight:600;color:var(--dim);background:transparent;transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text)}
video,canvas.hidden-util{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.algo-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:0.5px;background:#1a2a1a;color:var(--green);margin-left:6px}
</style>

<body>
<div class="container" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var e=React.createElement;
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;

// =====================================================================
// SNR-WEIGHTED PPG HEARTBEAT DETECTION ALGORITHM
// =====================================================================

var CHANNELS=['red','blue','L','a','b'];
var REFERENCE_CHANNEL='a';
var HR_BAND_LO=0.7;
var HR_BAND_HI=3.5;
var PEAK_FREQ_WINDOW=0.3;
var SETTLE_TIME_MS=2000;
var MIN_CONTACT_RED=100;
var MIN_BPM=42;
var MAX_BPM=210;

function median(arr){
var s=arr.slice().sort(function(a,b){return a-b});
var m=Math.floor(s.length/2);
return s.length%2===0?(s[m-1]+s[m])/2:s[m]}

function stdDev(arr){
var n=arr.length,sum=0;
for(var i=0;i<n;i++)sum+=arr[i];
var mean=sum/n,sq=0;
for(var i=0;i<n;i++)sq+=(arr[i]-mean)*(arr[i]-mean);
return Math.sqrt(sq/n)}

function trapz(y,x){
var s=0;
for(var i=1;i<y.length;i++)s+=0.5*(y[i]+y[i-1])*(x[i]-x[i-1]);
return s}

// --- Preprocessing ---
function deduplicateSamples(samples){
if(!samples.length)return[];
var result=[samples[0]];
var keys=['red','green','blue','L','a','b'];
for(var i=1;i<samples.length;i++){
var diff=false;
for(var k=0;k<keys.length;k++){
if(Math.abs(samples[i][keys[k]]-samples[i-1][keys[k]])>1e-9){diff=true;break}}
if(diff)result.push(samples[i])}
return result}

function trimSamples(samples){
var ci=-1;
for(var i=0;i<samples.length;i++){if(samples[i].red>=MIN_CONTACT_RED){ci=i;break}}
if(ci===-1)return[];
var post=samples.slice(ci);
var t0=post[0].time_ms;
var settled=post.filter(function(s){return s.time_ms>=t0+SETTLE_TIME_MS});
return settled.length<20?[]:settled}

function computeFs(samples){
var diffs=[];
for(var i=1;i<samples.length;i++)diffs.push(samples[i].time_ms-samples[i-1].time_ms);
diffs.sort(function(a,b){return a-b});
return 1000/diffs[Math.floor(diffs.length/2)]}

// --- Z-Score ---
function zNorm(values){
var n=values.length,sum=0;
for(var i=0;i<n;i++)sum+=values[i];
var mean=sum/n,sq=0;
for(var i=0;i<n;i++)sq+=(values[i]-mean)*(values[i]-mean);
var std=Math.sqrt(sq/n);
var r=new Float64Array(n);
if(std<1e-10)return r;
for(var i=0;i<n;i++)r[i]=(values[i]-mean)/std;
return r}

// --- Butterworth Bandpass (4th order via cascaded biquads) ---
function biquadLP(fc,fs,Q){
var w=2*Math.PI*fc/fs,a=Math.sin(w)/(2*Q),c=Math.cos(w),a0=1+a;
return{b:[(1-c)/2/a0,(1-c)/a0,(1-c)/2/a0],a:[1,-2*c/a0,(1-a)/a0]}}

function biquadHP(fc,fs,Q){
var w=2*Math.PI*fc/fs,a=Math.sin(w)/(2*Q),c=Math.cos(w),a0=1+a;
return{b:[(1+c)/2/a0,-(1+c)/a0,(1+c)/2/a0],a:[1,-2*c/a0,(1-a)/a0]}}

function getBandpassSOS(lo,hi,fs){
var Q1=Math.abs(1/(2*Math.cos(5*Math.PI/8)));
var Q2=Math.abs(1/(2*Math.cos(7*Math.PI/8)));
return[biquadHP(lo,fs,Q1),biquadHP(lo,fs,Q2),biquadLP(hi,fs,Q1),biquadLP(hi,fs,Q2)]}

function applyBiquad(b,a,x){
var n=x.length,y=new Float64Array(n),z1=0,z2=0;
for(var i=0;i<n;i++){
y[i]=b[0]*x[i]+z1;
z1=b[1]*x[i]-a[1]*y[i]+z2;
z2=b[2]*x[i]-a[2]*y[i]}
return y}

function applySOS(sections,x){
var y=x;
for(var s=0;s<sections.length;s++)y=applyBiquad(sections[s].b,sections[s].a,y);
return y}

function filtfiltSOS(sections,x){
var n=x.length;
var padLen=Math.min(3*2*sections.length,n-1);
if(n<=padLen+1){
var fwd=applySOS(sections,x);
var rev=new Float64Array(n);
for(var i=0;i<n;i++)rev[i]=fwd[n-1-i];
var bwd=applySOS(sections,rev);
var r=new Float64Array(n);
for(var i=0;i<n;i++)r[i]=bwd[n-1-i];
return r}
var padded=new Float64Array(n+2*padLen);
for(var i=0;i<padLen;i++)padded[i]=2*x[0]-x[padLen-i];
for(var i=0;i<n;i++)padded[padLen+i]=x[i];
for(var i=0;i<padLen;i++)padded[padLen+n+i]=2*x[n-1]-x[n-2-i];
var y=applySOS(sections,padded);
var yR=new Float64Array(y.length);
for(var i=0;i<y.length;i++)yR[i]=y[y.length-1-i];
var yB=applySOS(sections,yR);
var result=new Float64Array(n);
for(var i=0;i<n;i++)result[i]=yB[yB.length-1-padLen-i];
return result}

function bandpass(signal,fs){
var sos=getBandpassSOS(HR_BAND_LO,HR_BAND_HI,fs);
return filtfiltSOS(sos,signal)}

// --- FFT (Radix-2 Cooley-Tukey) ---
function nextPow2(n){var p=1;while(p<n)p<<=1;return p}

function fftCore(re,im){
var n=re.length;
var j=0;
for(var i=0;i<n-1;i++){
if(i<j){var t=re[i];re[i]=re[j];re[j]=t;t=im[i];im[i]=im[j];im[j]=t}
var m=n>>1;
while(m>=1&&j>=m){j-=m;m>>=1}
j+=m}
for(var size=2;size<=n;size*=2){
var half=size/2,ang=-2*Math.PI/size;
var wR=Math.cos(ang),wI=Math.sin(ang);
for(var i=0;i<n;i+=size){
var cR=1,cI=0;
for(var k=0;k<half;k++){
var ei=i+k,oi=i+k+half;
var tR=cR*re[oi]-cI*im[oi];
var tI=cR*im[oi]+cI*re[oi];
re[oi]=re[ei]-tR;im[oi]=im[ei]-tI;
re[ei]+=tR;im[ei]+=tI;
var nR=cR*wR-cI*wI;cI=cR*wI+cI*wR;cR=nR}}}
return{re:re,im:im}}

function rfft(signal){
var N=nextPow2(signal.length);
var re=new Float64Array(N),im=new Float64Array(N);
for(var i=0;i<signal.length;i++)re[i]=signal[i];
var r=fftCore(re,im);
var nF=Math.floor(N/2)+1;
var out=[];
for(var i=0;i<nF;i++)out.push({re:r.re[i],im:r.im[i]});
return{data:out,N:N}}

// --- Welch PSD ---
function welchPSD(signal,fs){
var n=signal.length;
var nperseg=Math.min(n,Math.floor(4*fs));
if(nperseg<8)nperseg=n;
var noverlap=Math.floor(nperseg/2);
var step=nperseg-noverlap;
var win=new Float64Array(nperseg),wSq=0;
for(var i=0;i<nperseg;i++){
win[i]=0.5*(1-Math.cos(2*Math.PI*i/(nperseg-1)));
wSq+=win[i]*win[i]}
var nfft=nextPow2(nperseg);
var nF=Math.floor(nfft/2)+1;
var freqs=new Float64Array(nF);
for(var i=0;i<nF;i++)freqs[i]=i*fs/nfft;
var psdSum=new Float64Array(nF),nSeg=0;
for(var start=0;start+nperseg<=n;start+=step){
var seg=new Float64Array(nfft);
for(var i=0;i<nperseg;i++)seg[i]=signal[start+i]*win[i];
var ft=rfft(seg);
for(var i=0;i<nF;i++){
var pw=ft.data[i].re*ft.data[i].re+ft.data[i].im*ft.data[i].im;
pw/=(fs*wSq);
if(i>0&&i<nF-1)pw*=2;
psdSum[i]+=pw}
nSeg++}
if(nSeg===0){
var seg=new Float64Array(nfft);
for(var i=0;i<Math.min(n,nperseg);i++)seg[i]=signal[i]*win[Math.min(i,nperseg-1)];
var ft=rfft(seg);
for(var i=0;i<nF;i++){
var pw=ft.data[i].re*ft.data[i].re+ft.data[i].im*ft.data[i].im;
pw/=(fs*wSq);if(i>0&&i<nF-1)pw*=2;psdSum[i]=pw}
nSeg=1}
var psd=new Float64Array(nF);
for(var i=0;i<nF;i++)psd[i]=psdSum[i]/nSeg;
return{freqs:freqs,psd:psd}}

// --- Channel SNR ---
function channelSNR(filtered,fs){
var r=welchPSD(filtered,fs);
var freqs=r.freqs,psd=r.psd;
var bIdx=[];
for(var i=0;i<freqs.length;i++)if(freqs[i]>=HR_BAND_LO&&freqs[i]<=HR_BAND_HI)bIdx.push(i);
if(bIdx.length<3)return{snr:0,peakFreq:0,psd:psd,freqs:freqs};
var bF=bIdx.map(function(i){return freqs[i]});
var bP=bIdx.map(function(i){return psd[i]});
var pi=0;for(var i=1;i<bP.length;i++)if(bP[i]>bP[pi])pi=i;
var pF=bF[pi];
var sI=[],nI=[];
for(var i=0;i<bF.length;i++){
if(Math.abs(bF[i]-pF)<=PEAK_FREQ_WINDOW)sI.push(i);else nI.push(i)}
var sP=sI.length>1?trapz(sI.map(function(i){return bP[i]}),sI.map(function(i){return bF[i]})):bP[pi];
var nP=nI.length>1?trapz(nI.map(function(i){return bP[i]}),nI.map(function(i){return bF[i]})):1e-10;
return{snr:sP/Math.max(nP,1e-10),peakFreq:pF,psd:psd,freqs:freqs}}

// --- Sign Alignment ---
function pearson(x,y){
var n=x.length,sX=0,sY=0,sXY=0,sX2=0,sY2=0;
for(var i=0;i<n;i++){sX+=x[i];sY+=y[i];sXY+=x[i]*y[i];sX2+=x[i]*x[i];sY2+=y[i]*y[i]}
var num=n*sXY-sX*sY;
var den=Math.sqrt((n*sX2-sX*sX)*(n*sY2-sY*sY));
return den<1e-10?0:num/den}

function signAlign(filtered){
var ref=filtered[REFERENCE_CHANNEL];
var signs={};
for(var i=0;i<CHANNELS.length;i++){
var ch=CHANNELS[i];
if(ch===REFERENCE_CHANNEL){signs[ch]=1;continue}
signs[ch]=pearson(Array.from(filtered[ch]),Array.from(ref))>=0?1:-1}
return signs}

// --- Peak Detection ---
function findPeaks(signal,params){
var dist=params.distance,ht=params.height,prom=params.prominence;
var n=signal.length,cands=[];
for(var i=1;i<n-1;i++)if(signal[i]>signal[i-1]&&signal[i]>=signal[i+1])cands.push(i);
var peaks=cands.filter(function(i){return signal[i]>=ht});
peaks=peaks.filter(function(pk){
var v=signal[pk],lm=v,rm=v;
for(var i=pk-1;i>=0;i--){lm=Math.min(lm,signal[i]);if(signal[i]>v)break}
for(var i=pk+1;i<n;i++){rm=Math.min(rm,signal[i]);if(signal[i]>v)break}
return v-Math.max(lm,rm)>=prom});
var sorted=peaks.slice().sort(function(a,b){return signal[b]-signal[a]});
var keep={},supp={};
for(var i=0;i<sorted.length;i++){
var p=sorted[i];if(supp[p])continue;keep[p]=true;
for(var j=0;j<sorted.length;j++){var q=sorted[j];if(q!==p&&Math.abs(q-p)<dist)supp[q]=true}}
return Object.keys(keep).map(Number).sort(function(a,b){return a-b})}

// --- Heart Rate ---
function computeHR(peaks,fs){
if(peaks.length<2)return{instantHR:[],ibiMs:[],rejected:[],meanHR:NaN,rmssd:NaN,beatCount:peaks.length};
var ibi=[];
for(var i=1;i<peaks.length;i++)ibi.push((peaks[i]-peaks[i-1])/fs*1000);
var hr=ibi.map(function(v){return 60000/v});
var rej=hr.map(function(v){return v<MIN_BPM||v>MAX_BPM});
var vHR=hr.filter(function(_,i){return!rej[i]});
var vIBI=ibi.filter(function(_,i){return!rej[i]});
var meanHR=NaN;
if(vHR.length>0){var s=0;for(var i=0;i<vHR.length;i++)s+=vHR[i];meanHR=s/vHR.length}
var rmssd=NaN;
if(vIBI.length>1){var sq=0;for(var i=1;i<vIBI.length;i++)sq+=(vIBI[i]-vIBI[i-1])*(vIBI[i]-vIBI[i-1]);rmssd=Math.sqrt(sq/(vIBI.length-1))}
return{instantHR:hr,ibiMs:ibi,rejected:rej,meanHR:meanHR,rmssd:rmssd,beatCount:peaks.length}}

// --- Complete Pipeline ---
function detectHeartbeats(rawSamples){
var samples=rawSamples.map(function(s){return{time_ms:s.t,red:s.r,green:s.g,blue:s.b,L:s.L,a:s.a,b:s.lb}});
var processed=deduplicateSamples(samples);
processed=trimSamples(processed);
if(processed.length<20)return{error:'Insufficient data after preprocessing',beats:[],meanHR:NaN};
var fs=computeFs(processed);
var n=processed.length;
var chData={},normalized={},filtered={};
var sos=getBandpassSOS(HR_BAND_LO,HR_BAND_HI,fs);
for(var ci=0;ci<CHANNELS.length;ci++){
var ch=CHANNELS[ci];
var arr=new Float64Array(n);
for(var i=0;i<n;i++)arr[i]=processed[i][ch];
chData[ch]=arr;
normalized[ch]=zNorm(arr);
filtered[ch]=filtfiltSOS(sos,normalized[ch])}
var snrs={},peakFreqs={},psdData={};
for(var ci=0;ci<CHANNELS.length;ci++){
var ch=CHANNELS[ci];
var sr=channelSNR(filtered[ch],fs);
snrs[ch]=sr.snr;peakFreqs[ch]=sr.peakFreq;psdData[ch]={freqs:sr.freqs,psd:sr.psd}}
var signs=signAlign(filtered);
var totalSNR=0;
for(var ci=0;ci<CHANNELS.length;ci++)totalSNR+=snrs[CHANNELS[ci]];
var weights={};
if(totalSNR<1e-10){for(var ci=0;ci<CHANNELS.length;ci++)weights[CHANNELS[ci]]=1/CHANNELS.length}
else{for(var ci=0;ci<CHANNELS.length;ci++)weights[CHANNELS[ci]]=snrs[CHANNELS[ci]]/totalSNR}
var ppg=new Float64Array(n);
for(var ci=0;ci<CHANNELS.length;ci++){
var ch=CHANNELS[ci],w=weights[ch]*signs[ch],f=filtered[ch];
for(var i=0;i<n;i++)ppg[i]+=w*f[i]}
var ppgF=filtfiltSOS(sos,ppg);
var cSNR=channelSNR(ppgF,fs);
var domFreq=cSNR.peakFreq;if(domFreq<0.5)domFreq=1.2;
var expIBI=fs/domFreq;
var minDist=Math.max(Math.floor(expIBI*0.5),1);
var ppgArr=Array.from(ppgF);
var pos=ppgArr.filter(function(v){return v>0});
var medAmp=pos.length>0?median(pos):stdDev(ppgArr);
var minH=0.3*medAmp;
var minP=0.3*stdDev(ppgArr);
var peaks=findPeaks(ppgArr,{distance:minDist,height:minH,prominence:minP});
var hrR=computeHR(peaks,fs);
var beats=peaks.map(function(idx){return{index:idx,timeMs:processed[idx].time_ms,amplitude:ppgF[idx]}});
return{beats:beats,ppgSignal:ppgF,samplingRateHz:fs,channelWeights:weights,channelSigns:signs,
channelSNRs:snrs,channelPeakFreqs:peakFreqs,channelPSD:psdData,
combinedPSD:{freqs:cSNR.freqs,psd:cSNR.psd},dominantFreqHz:domFreq,
filteredChannels:filtered,rawChannelData:chData,processedSamples:processed,
instantHR:hrR.instantHR,ibiMs:hrR.ibiMs,rejected:hrR.rejected,
meanHR:hrR.meanHR,rmssd:hrR.rmssd,beatCount:hrR.beatCount,peakIndices:peaks}}

// =====================================================================
// APP COMPONENT
// =====================================================================
function App(){
var _phase=useState("ready"),phase=_phase[0],setPhase=_phase[1];
var _progress=useState(0),progress=_progress[0],setProgress=_progress[1];
var _bpm=useState(0),bpm=_bpm[0],setBpm=_bpm[1];
var _msg=useState(""),msg=_msg[0],setMsg=_msg[1];
var _samples=useState(null),samples=_samples[0],setSamples=_samples[1];
var _analysis=useState(null),analysis=_analysis[0],setAnalysis=_analysis[1];
var _tab=useState("ppg"),tab=_tab[0],setTab=_tab[1];
var _channels=useState({red:true,blue:false,L:false,a:true,b:false}),channels=_channels[0],setChannels=_channels[1];
var _duration=useState(15),duration=_duration[0],setDuration=_duration[1];
var _allSessions=useState([]),allSessions=_allSessions[0],setAllSessions=_allSessions[1];
var vidRef=useRef(null),canRef=useRef(null),samplesRef=useRef([]),streamRef=useRef(null),rafRef=useRef(null),startRef=useRef(0);

var cleanup=function(){
if(streamRef.current){streamRef.current.getVideoTracks().forEach(function(t){
try{t.applyConstraints({advanced:[{torch:false}]})}catch(ex){}
t.stop()});streamRef.current=null}
if(rafRef.current)cancelAnimationFrame(rafRef.current)};
useEffect(function(){return cleanup},[]);

function rgbToLab(r,g,b){
var rl=r/255,gl=g/255,bl=b/255;
rl=rl>0.04045?Math.pow((rl+0.055)/1.055,2.4):rl/12.92;
gl=gl>0.04045?Math.pow((gl+0.055)/1.055,2.4):gl/12.92;
bl=bl>0.04045?Math.pow((bl+0.055)/1.055,2.4):bl/12.92;
var x=(rl*0.4124564+gl*0.3575761+bl*0.1804375)/0.95047;
var y=(rl*0.2126729+gl*0.7151522+bl*0.0721750)/1.00000;
var z=(rl*0.0193339+gl*0.1191920+bl*0.9503041)/1.08883;
